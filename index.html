<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>한자 손가락 따라쓰기 앱</title>
<style>
  :root{
    --blue:#1687c9; --dark:#222; --soft:#f5f8fb; --line:#d7e2ea; --good:#16a34a; --bad:#ef4444;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;background:linear-gradient(180deg,#eaf7ff,#fff);color:var(--dark);}
  header{padding:16px 16px 10px;text-align:center;}
  h1{font-size:24px;margin:6px 0 4px;}
  .sub{font-size:14px;color:#567;}
  .wrap{max-width:980px;margin:0 auto;padding:10px 14px 90px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.06);padding:14px;margin:12px 0;}
  .top{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:840px){.top{grid-template-columns:1.15fr .85fr;align-items:start;}}
  .current{text-align:center;}
  .hanjaBox{position:relative;width:min(86vw,460px);height:min(86vw,460px);max-height:460px;margin:8px auto;border:3px solid #111;border-radius:16px;background:#fff;overflow:hidden;touch-action:none;}
  .guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif CJK KR","Nanum Myeongjo","Apple SD Gothic Neo",serif;font-size:260px;font-weight:700;color:rgba(0,0,0,.13);line-height:1;user-select:none;}
  canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
  .infoRow{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin:8px 0;}
  .pill{border-radius:999px;padding:8px 12px;background:#eef7ff;border:1px solid #cde8ff;font-weight:700;}
  .meaning{font-size:22px;}
  .sound{font-size:22px;color:var(--blue);}
  button,select{font:inherit;border:0;border-radius:14px;padding:12px 14px;font-weight:800;cursor:pointer;}
  button{background:var(--blue);color:white;box-shadow:0 4px 10px rgba(22,135,201,.22);}
  button.secondary{background:#f1f5f9;color:#223;box-shadow:none;border:1px solid #dbe4ee;}
  button.good{background:var(--good);} button.bad{background:var(--bad);}
  .btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px;max-height:420px;overflow:auto;padding:4px;}
  .tile{background:#fff;border:2px solid #d9e5ef;border-radius:14px;text-align:center;padding:8px 4px;min-height:66px;display:flex;flex-direction:column;justify-content:center;gap:2px;}
  .tile.active{border-color:var(--blue);background:#e9f7ff;}
  .tile.done{border-color:#a7e0b8;background:#effff3;}
  .tile .h{font-size:28px;color:var(--blue);font-family:"Noto Serif CJK KR","Nanum Myeongjo",serif;font-weight:700;}
  .tile .m{font-size:11px;color:#667;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .progress{height:16px;background:#edf2f7;border-radius:999px;overflow:hidden;margin:10px 0;}
  .bar{height:100%;width:0%;background:linear-gradient(90deg,#4ade80,#1687c9);transition:.25s;}
  .quizBox{text-align:center;display:none;}
  .quizQ{font-size:36px;font-weight:900;margin:8px;color:var(--blue);font-family:"Noto Serif CJK KR","Nanum Myeongjo",serif;}
  .answers{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .answers button{background:#fff;color:#123;border:2px solid #dbe4ee;box-shadow:none;min-height:56px;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#111;color:#fff;padding:12px 16px;border-radius:999px;font-weight:800;opacity:0;pointer-events:none;transition:.25s;z-index:10;white-space:nowrap;}
  .toast.show{opacity:1;bottom:34px;}
  .mode{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0;}
  .mode button{background:#fff;color:#123;border:2px solid #dbe4ee;box-shadow:none;}
  .mode button.on{background:#111;color:#fff;border-color:#111;}
  .small{font-size:12px;color:#789;text-align:center;line-height:1.5;}
</style>
</head>
<body>
<header>
  <h1>한자 손가락 따라쓰기</h1>
  <div class="sub">회색 글자를 손가락으로 따라 그리고, 소리와 뜻을 맞혀요.</div>
</header>
<div class="wrap">
  <div class="card">
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="small"><span id="countText">0 / 40</span> 완료 · 별 <span id="starText">0</span>개</div>
  </div>

  <div class="top">
    <section class="card current" id="traceSection">
      <div class="mode">
        <button id="traceMode" class="on">따라쓰기</button>
        <button id="quizMode">퀴즈</button>
        <button id="soundBtn" class="secondary">🔊 읽기</button>
      </div>
      <div class="infoRow">
        <span class="pill meaning" id="meaning">노래</span>
        <span class="pill sound" id="sound">가</span>
      </div>
      <div class="hanjaBox" id="hanjaBox">
        <div class="guide" id="guide">歌</div>
        <canvas id="draw"></canvas>
      </div>
      <div class="btns">
        <button class="secondary" id="prevBtn">◀ 이전</button>
        <button class="secondary" id="clearBtn">지우기</button>
        <button class="good" id="doneBtn">완성 ⭐</button>
        <button id="nextBtn">다음 ▶</button>
      </div>
      <p class="small">아이패드는 손가락/애플펜슬 모두 가능. 홈 화면에 추가하면 앱처럼 쓸 수 있어요.</p>
    </section>

    <section class="card quizBox" id="quizSection">
      <div class="mode">
        <button id="backTrace">따라쓰기</button>
        <button class="on">퀴즈</button>
      </div>
      <div class="small">뜻과 소리를 보고 알맞은 한자를 눌러요.</div>
      <div class="quizQ" id="quizQ">노래 가</div>
      <div class="answers" id="answers"></div>
    </section>

    <section class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;">
        <b>한자 선택</b>
        <button class="secondary" id="resetBtn" style="padding:8px 10px;font-size:13px;">기록 초기화</button>
      </div>
      <div class="grid" id="grid"></div>
    </section>
  </div>
</div>
<div class="toast" id="toast">참 잘했어요!</div>
<script>
const DATA = [
 ['歌','노래','가'],['家','집','가'],['間','사이','간'],['車','수레','거'],['巾','수건','건'],['古','예','고'],['空','빌','공'],['敎','가르칠','교'],['校','학교','교'],['國','나라','국'],
 ['軍','군사','군'],['今','이제','금'],['記','기록할','기'],['氣','기운','기'],['己','몸','기'],['農','농사','농'],['答','대답','답'],['代','대신할','대'],['大','큰','대'],['道','길','도'],
 ['洞','골','동'],['登','오를','등'],['來','올','래'],['老','늙을','로'],['里','마을','리'],['林','수풀','림'],['馬','말','마'],['萬','일만','만'],['末','끝','말'],['每','매양','매'],
 ['面','낯','면'],['問','물을','문'],['物','물건','물'],['民','백성','민'],['本','근본','본'],['不','아니','불'],['分','나눌','분'],['士','선비','사'],['事','일','사'],['色','빛','색']
];
let idx = Number(localStorage.getItem('hanja_idx')||0); let done = JSON.parse(localStorage.getItem('hanja_done')||'{}');
const guide=document.getElementById('guide'), meaning=document.getElementById('meaning'), sound=document.getElementById('sound'), grid=document.getElementById('grid');
const canvas=document.getElementById('draw'), box=document.getElementById('hanjaBox'), ctx=canvas.getContext('2d'); let drawing=false;
function resize(){ const r=box.getBoundingClientRect(); canvas.width=r.width*devicePixelRatio; canvas.height=r.height*devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=15; ctx.strokeStyle='#1687c9'; }
window.addEventListener('resize',resize); setTimeout(resize,50);
function pos(e){ const r=canvas.getBoundingClientRect(); const p=e.touches?e.touches[0]:e; return {x:p.clientX-r.left,y:p.clientY-r.top}; }
function start(e){drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault();}
function move(e){ if(!drawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault();}
function end(){drawing=false;}
canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
function speak(){ const [h,m,s]=DATA[idx]; if('speechSynthesis' in window){ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(`${m} ${s}. ${h}`); u.lang='ko-KR'; u.rate=.75; speechSynthesis.speak(u);} }
function load(i){ idx=(i+DATA.length)%DATA.length; localStorage.setItem('hanja_idx',idx); const [h,m,s]=DATA[idx]; guide.textContent=h; meaning.textContent=m; sound.textContent=s; clear(); renderGrid(); }
function clear(){ ctx.clearRect(0,0,canvas.width,canvas.height); }
function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1200); }
function complete(){ done[DATA[idx][0]]=true; localStorage.setItem('hanja_done',JSON.stringify(done)); toast('참 잘했어요! ⭐'); renderGrid(); updateProgress(); setTimeout(()=>load(idx+1),500); }
function updateProgress(){ const c=Object.keys(done).length; document.getElementById('countText').textContent=`${c} / ${DATA.length}`; document.getElementById('starText').textContent=c; document.getElementById('bar').style.width=(c/DATA.length*100)+'%'; }
function renderGrid(){ grid.innerHTML=''; DATA.forEach((d,i)=>{ const div=document.createElement('div'); div.className='tile'+(i===idx?' active':'')+(done[d[0]]?' done':''); div.innerHTML=`<div class="h">${d[0]}</div><div class="m">${d[1]} ${d[2]}</div>`; div.onclick=()=>load(i); grid.appendChild(div); }); updateProgress(); }
function showQuiz(){ document.getElementById('traceSection').style.display='none'; document.getElementById('quizSection').style.display='block'; makeQuiz(); }
function showTrace(){ document.getElementById('traceSection').style.display='block'; document.getElementById('quizSection').style.display='none'; setTimeout(resize,50); }
function makeQuiz(){ const q=DATA[Math.floor(Math.random()*DATA.length)]; document.getElementById('quizQ').textContent=`${q[1]} ${q[2]}`; let opts=[q]; while(opts.length<4){ const r=DATA[Math.floor(Math.random()*DATA.length)]; if(!opts.some(x=>x[0]===r[0])) opts.push(r); } opts.sort(()=>Math.random()-.5); const ans=document.getElementById('answers'); ans.innerHTML=''; opts.forEach(o=>{ const b=document.createElement('button'); b.textContent=o[0]; b.style.fontSize='34px'; b.style.fontFamily='Noto Serif CJK KR, Nanum Myeongjo, serif'; b.onclick=()=>{ if(o[0]===q[0]){toast('정답! ⭐'); done[o[0]]=true; localStorage.setItem('hanja_done',JSON.stringify(done)); renderGrid(); setTimeout(makeQuiz,500);} else toast('다시 해봐요!'); }; ans.appendChild(b); }); }
document.getElementById('clearBtn').onclick=clear; document.getElementById('doneBtn').onclick=complete; document.getElementById('nextBtn').onclick=()=>load(idx+1); document.getElementById('prevBtn').onclick=()=>load(idx-1); document.getElementById('soundBtn').onclick=speak; document.getElementById('quizMode').onclick=showQuiz; document.getElementById('traceMode').onclick=showTrace; document.getElementById('backTrace').onclick=showTrace; document.getElementById('resetBtn').onclick=()=>{ if(confirm('완료 기록을 지울까요?')){done={}; localStorage.removeItem('hanja_done'); renderGrid(); toast('초기화 완료');}};
load(idx);
</script>
</body>
</html>
